_config_version: 33
agent:
  verify_on_stop: false
auxiliary:
  vision:
    api_key: ''
    base_url: ''
    fallback_chain:
    - model: stepfun/step-3.7-flash:free
      provider: nous
    model: gemini-3.1-flash
    provider: gemini
    timeout: 90
browser:
  backend: local
  use_gateway: false
delegation:
  inherit_mcp_toolsets: true
  max_concurrent_children: 3
  max_spawn_depth: 2
  model: anthropic/claude-fable-5-free
  orchestrator_enabled: true
  provider: zenmux
  reasoning_effort: high
display:
  tool_progress: all
fallback_providers:
- model: glm-5.2
  provider: nvidia
- model: anthropic/claude-sonnet-5-free
  provider: zenmux
- model: stepfun/step-3.7-flash:free
  provider: nous
image_gen:
  use_gateway: false
model:
  base_url: ''
  default: big-pickle
  max_tokens: 128000
  provider: opencode-zen
plugins:
  enabled: []
providers:
  zenmux:
    base_url: https://zenmux.ai/api/v1
    key_env: ZENMUX_API_KEY
security:
  redact_secrets: true
skills:
  external_dirs:
  - meta-skills
  - ~/open-skills/skills
  - ~/multi-gws-cli
toolsets:
- safe
tts:
  use_gateway: false
web:
  backend: ddgs
  use_gateway: false
