author: hermes-setup
description: Personal assistant for an Israeli mental-health therapist — practice management, confidential session notes, scheduling, Hebrew intake forms & letters.
distribution_owned:
- README.md
- SOUL.md
- config.yaml
- cron
- distribution.yaml
- mcp.json
- meta-skills
- setup.steps.ps1
- setup.steps.sh
- skill-bundles
- skills.install.json
- skills.sh.json
env_requires:
- description: Primary provider (opencode-zen / big-pickle) — sign in and create/copy a Zen API key at https://opencode.ai/auth.
  name: OPENCODE_ZEN_API_KEY
  required: false
- description: Fallback + delegation provider (zenmux / claude-sonnet-5-free / claude-fable-5-free) — top up credits and create a Pay As You Go key at https://zenmux.ai/platform/pay-as-you-go; restrict the key to free models to use only free-tier quota.
  name: ZENMUX_API_KEY
  required: false
- description: Fallback provider (nvidia / glm-5.2) — generate a NVIDIA Build API key at https://build.nvidia.com/settings/api-keys.
  name: NVIDIA_API_KEY
  required: false
- description: Vision aux (gemini) — create a Google AI Studio Gemini API key at https://aistudio.google.com/app/apikey. GEMINI_API_KEY also accepted.
  name: GOOGLE_API_KEY
  required: false
- description: Mobile chat surface — create a free bot via @BotFather and paste its token. Tier 1, optional; enables reminders/proactive messages.
  name: TELEGRAM_BOT_TOKEN
  required: false
- description: Your Telegram chat id (the bot reports it) — the default delivery target for scheduled reminders.
  name: TELEGRAM_HOME_CHANNEL
  required: false
hermes_requires: '>=0.18.0'
license: MIT
name: il-therapist
version: 2.0.0
