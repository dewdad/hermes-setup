name: il
kind: locale
extends: base/general

distribution:
  description: Hebrew-first Israeli agent — RTL-aware, gov/forms-ready, on the free base chain.
  version: 1.0.0
  license: MIT
  author: hermes-setup

soul:
  fragments:
    - he-style.md
    - discover-skills.md

# Reference-only: this repo authors no skills. Hebrew/RTL correctness and document generation come
# from verified-real trusted-registry skills auto-installed by the apply flow (see post_install).
# The persona SOUL fragments (he-style.md, inherited identity/safety) shape Hebrew-first behavior.
skills:
  bundled: none

# Bundle grouping Hebrew doc production — references the real skill names the post_install block
# installs (skills.sh installs `anthropics/skills/docx` as local skill `docx`, etc.).
bundles:
  - name: hebrew-docs
    description: Hebrew/RTL document production — letters, forms, spreadsheets, PDFs.
    skills: [hebrew-rtl-best-practices, docx, pdf, xlsx]
    instruction: >
      Follow hebrew-rtl-best-practices for Hebrew RTL output; use the Anthropic doc skills for
      docx/pdf/xlsx generation once installed.

# Bucket 3 (referenced post-install, auto-installed by the apply flow). Every id below is verified
# real via `hermes skills search`:
#   - anthropics docx/pdf/pptx/xlsx  → trusted (skills.sh, source-available; free to run locally)
#   - skills-il hebrew-rtl-best-practices → real community skill from the skills-il tap
# Every IL persona inherits these.
post_install:
  - id: skills-sh/skills-il/localization/hebrew-rtl-best-practices
    note: Hebrew/RTL best-practices from agentskills.co.il (skills-il). Free to run.
    tier: 0
  - id: skills-sh/skills-il/localization/hebrew-document-generator
    note: IL-native Hebrew PDF/DOCX/PPTX with correct RTL + bidi. Preferred for Hebrew output.
    tier: 0
  - id: skills-sh/anthropics/skills/docx
    note: Word documents (non-Hebrew fallback). Source-available; free to run locally.
    tier: 0
  - id: skills-sh/anthropics/skills/pdf
    note: PDF generation/extraction (non-Hebrew fallback). Source-available; free to run locally.
    tier: 0
  - id: skills-sh/anthropics/skills/pptx
    note: Presentations (non-Hebrew fallback). Source-available; free to run locally.
    tier: 0
  - id: skills-sh/anthropics/skills/xlsx
    note: Spreadsheets. Source-available; free to run locally.
    tier: 0

# Feature 4 (discovery layer a): IL catalogues appended to the general list (set-union by url).
# URLs only — no secrets. skills-il has no native Hermes tap (G7 negative), so discovery is by
# github-source ids (above) + these catalogue links, not `hermes skills tap add`.
discovery:
  - label: agentskills.co.il
    url: https://agentskills.co.il
    note: The Israeli skills catalogue (GitHub org skills-il) — Hebrew, gov, localization, more.
  - label: Claude-Israel index
    url: https://github.com/danielrosehill/Claude-Israel
    note: Curated index of Israel-focused agent skills and resources.
