name: il-citizen
kind: persona
extends: locale/il

distribution:
  description: Everyday Israeli citizen assistant — gov services, consumer rights, forms, budgeting.
  version: 1.0.0
  license: MIT
  author: hermes-setup

soul:
  fragments:
    - citizen-scope.md

# Reference-only: no authored skills. The citizen scope (gov services, consumer rights, pensions,
# budgeting) is shaped by the citizen-scope SOUL fragment plus inherited Hebrew/RTL + doc skills.
# NOTE (verified 2026-07 via `hermes skills search`): NO trusted-registry skill exists for Israeli
# gov-services, consumer-rights, grocery-price-intelligence, or pension advice — only unvetted
# community entries — so per the reference-only contract none are referenced here (not authored).
skills:
  bundled: none

# Bucket 3 (referenced post-install, auto-installed by the apply flow). Verified real via
# `hermes skills inspect` (2026-07-08) from agentskills.co.il (skills-il). Inherits the Hebrew/RTL,
# Hebrew doc generator, and doc-fallback skills from locale/il. Adds the everyday gov-services
# navigator. Payment-gateway / bank-connector (tax-and-finance) skills are excluded (free-to-run).
post_install:
  - id: skills-sh/skills-il/government-services/israeli-bureaucracy-decoder
    note: Decode Israeli gov letters/forms (Tax Authority, Bituach Leumi, municipalities) to plain language.
    tier: 0
